<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you! · Anne De Guzman</title>
    <!-- same reliable Font Awesome & fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffe9f4 0%, #ffe0f0 100%);
            font-family: 'Quicksand', sans-serif;
            color: #4a3f4b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .thanks-card {
            max-width: 650px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(247, 120, 160, 0.2),
                        0 10px 25px rgba(255, 200, 220, 0.5),
                        inset 0 2px 4px rgba(255,255,255,0.8);
            padding: 3rem 2.5rem;
            border: 2px solid rgba(255,255,255,0.7);
            animation: softPop 0.6s ease-out;
            text-align: center;
        }

        @keyframes softPop {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        .heart-bounce {
            font-size: 5rem;
            color: #f091b3;
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem;
            font-weight: 650;
            color: #954f6e;
            margin-bottom: 0.8rem;
            text-shadow: 2px 2px 0 #ffe2f0;
        }

        .message {
            font-size: 1.3rem;
            margin: 1.2rem 0 1.8rem;
            background: #ffeef4;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            border: 2px solid white;
            display: inline-block;
            color: #784762;
        }

        .info-text {
            font-size: 1.1rem;
            margin: 1.5rem 0 2rem;
            color: #6e4f62;
        }

        .btn {
            background: #f59dc0;
            border: none;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid white;
            box-shadow: 0 8px 16px #fac0d8;
            text-decoration: none;
        }

        .btn i {
            font-size: 1.2rem;
        }

        .btn:hover {
            background: #f27db0;
            transform: scale(1.02);
            box-shadow: 0 12px 22px #f7a6c7;
        }

        .footer-note {
            margin-top: 2.5rem;
            font-size: 0.95rem;
            color: #b0849b;
        }

        .footer-note i {
            color: #e07ca3;
            margin: 0 4px;
        }

        hr {
            width: 80px;
            margin: 2rem auto 1rem;
            border: 2px dotted #fbb8d4;
        }
    </style>
</head>
<body>
    <div class="thanks-card">
        <!-- bouncing heart -->
        <div class="heart-bounce">
            <i class="fas fa-heart"></i>
        </div>

        <h1>thank you!</h1>
        
        <div class="message">
            <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> 
            message sent
        </div>

        <div class="info-text">
            thanks for reaching out, i’ll get back to you <br> as soon as possible ♡
        </div>

        <!-- button back to resume (or home) -->
        <a href="index.html" class="btn">
            <i class="fas fa-arrow-left"></i> back to resume
        </a>

        <hr>

        <div class="footer-note">
            <i class="fas fa-crown"></i> Anne E. De Guzman · freelance virtual assistant <i class="fas fa-sparkles"></i>
        </div>

        <!-- small extra: direct email -->
        <div style="margin-top: 1.2rem; font-size: 0.9rem;">
            <i class="fas fa-envelope"></i> annedeguzman.dsi@gmail.com
        </div>
    </div>
</body>
</html>
